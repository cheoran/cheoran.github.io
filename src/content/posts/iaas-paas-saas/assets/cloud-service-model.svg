<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="900" viewBox="0 0 1280 900" role="img" aria-labelledby="title desc">
	<title id="title">On-site IaaS PaaS SaaS management responsibility model</title>
	<desc id="desc">Comparison chart showing which layers are managed by users versus service providers across On-site, IaaS, PaaS, and SaaS.</desc>
	<defs>
		<linearGradient id="bg" x1="0" x2="0" y1="0" y2="1">
			<stop offset="0%" stop-color="#0a0f17" />
			<stop offset="100%" stop-color="#05070c" />
		</linearGradient>
		<filter id="softShadow" x="-20%" y="-20%" width="140%" height="140%">
			<feDropShadow dx="0" dy="4" stdDeviation="5" flood-color="#000000" flood-opacity="0.35" />
		</filter>
		<style>
			.title {
				font: 800 44px "Pretendard", "Noto Sans KR", sans-serif;
				fill: #f3f7ff;
				letter-spacing: 0.4px;
			}
			.subtitle {
				font: 600 22px "Pretendard", "Noto Sans KR", sans-serif;
				fill: #9db2d1;
			}
			.column {
				font: 800 44px "Pretendard", "Noto Sans KR", sans-serif;
				fill: #ffffff;
			}
			.layer {
				font: 700 34px "Pretendard", "Noto Sans KR", sans-serif;
				fill: #f6fbff;
			}
			.legend {
				font: 650 30px "Pretendard", "Noto Sans KR", sans-serif;
				fill: #e8f0ff;
			}
		</style>
	</defs>

	<rect x="0" y="0" width="1280" height="900" fill="url(#bg)" />
	<text x="640" y="72" text-anchor="middle" class="title">Cloud Service Model Responsibility Matrix</text>
	<text x="640" y="112" text-anchor="middle" class="subtitle">사용자와 서비스 제공자의 관리 책임 범위 비교</text>

	<text x="205" y="170" text-anchor="middle" class="column">On-site</text>
	<text x="485" y="170" text-anchor="middle" class="column">IaaS</text>
	<text x="765" y="170" text-anchor="middle" class="column">PaaS</text>
	<text x="1045" y="170" text-anchor="middle" class="column">SaaS</text>

